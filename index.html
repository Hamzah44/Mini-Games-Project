<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        /* Cheerful, bright playground background */
        body {
            font-family: 'Varela Round', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Bubbly Cartoon Header */
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: #ff5722;
            margin-bottom: 50px;
            text-align: center;
            /* Creates a thick, sticker-like outline around the text */
            text-shadow: 
                -3px -3px 0 #fff,  
                 3px -3px 0 #fff,
                -3px  3px 0 #fff,
                 3px  3px 0 #fff,
                 0px  6px 0 rgba(0,0,0,0.1);
        }

        /* Container to hold the game cards */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 900px;
        }

        /* Chunky, 3D button styling */
        .game-card {
            background-color: #fff;
            border: 4px solid #333; /* Strong cartoon outline */
            border-radius: 20px;
            padding: 25px 30px;
            text-decoration: none;
            color: #333;
            font-size: 1.5rem;
            font-family: 'Fredoka One', cursive;
            text-align: center;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.1s ease; /* Fast transition for a snappy feel */
            /* This creates the 3D block effect */
            box-shadow: 0 8px 0 #333; 
        }

        /* Adding emojis to the top of the cards so non-strong readers can identify games quickly */
        .game-card::before {
            font-size: 3rem;
            line-height: 1;
        }

        /* Unique Colors and Icons for Each Game */
        .card-anatomy { background-color: #ffeb3b; }
        .card-anatomy::before { content: "🦴"; }

        .card-dive { background-color: #00bcd4; color: white; }
        .card-dive::before { content: "🤿"; }

        .card-reaction { background-color: #ff4081; color: white; }
        .card-reaction::before { content: "⚡"; }

        .card-robobug { background-color: #4caf50; color: white; }
        .card-robobug::before { content: "🤖"; }

        .card-starspell { background-color: #9c27b0; color: white; }
        .card-starspell::before { content: "⭐"; }

        /* Tactile interaction: When hovered, slightly lift */
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #333;
        }

        /* Tactile interaction: When clicked, squish down like a real button */
        .game-card:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #333;
        }

        /* Responsive scaling for smaller tablets/screens */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .game-card { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>

    <h1>🎮 Mini Games Hub 🎮</h1>

    <div class="game-grid">
        <a href="Body%20Anatomy/" class="game-card card-anatomy">Body Anatomy</a>
        <a href="Deep%20dive/" class="game-card card-dive">Deep Dive</a>
        <a href="Reaction-Lab/" class="game-card card-reaction">Reaction Lab</a>
        <a href="RoboBug/" class="game-card card-robobug">RoboBug</a>
        <a href="StarSpell/" class="game-card card-starspell">StarSpell</a>
    </div>

</body>
</html>
